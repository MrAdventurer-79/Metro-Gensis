  PLS_council_decision_category: "Комитет Полиса"
  PLS_council_decision_category_desc: "Всегда недовольный, часто сварливый Совет Полиса - это место, где кодифицируется большинство указов и поднимаются острые вопросы. Жизни и будущее стольких людей находятся в руках столь немногих.\n"

  PLS_gain_council_sway: "Мы добьемся §Yполитического влияния§! в Совете!"

  PLS_council_allow_community_membership: "Разрешить шудрам входить в Совет"
  PLS_council_allow_oligarch_membership: "Разрешить вайшьям входить в Совет"
