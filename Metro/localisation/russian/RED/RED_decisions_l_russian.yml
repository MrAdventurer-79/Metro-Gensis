 RED_politburo_category: "Политбюро"
 RED_politburo_category_desc: "Политбюро — главный центральный руководящий орган Коммунистической партии и Красной линии. Состоит из старожилов, которые когда-то были членами политической партии со времен социализма в России. Они определяют политику Красной линии в целом. Ничто не происходит без их прямого разрешения. Лучше всего поддерживать их удовлетворенность и не рисковать вызвать их гнев.\n\nЧем больше будет удовлетворено Политбюро, тем легче будет реформировать или менять наше национальное положение.\n\nСейчас Политбюро на §C[?politburo_happiness]§! удовлетворено"

