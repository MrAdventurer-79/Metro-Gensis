 STB_focus_9B: "Атаковать [AVT.GetAdjective]"
 STB_focus_9B_desc: "Партизаны из станции [AVT.capital.GetName] были постоянной головной болью для Бригады Стортбекера. Недавние столкновения между нашими отрядами привели к жажде мести, и сейчас самое время избавиться от них раз и навсегда."
