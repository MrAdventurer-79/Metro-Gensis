 STB_internal_focus_9A: "Продвигаться к [SEV.GetAdjective]"
 STB_internal_focus_9A_desc: "[SEV.GetName] остаётся жизненно важным транспортным узлом для большей части Южного Метро, в том числе благодаря сохранившимся гидроэлектростанциям. В прошлом это был самоубийственный шаг для наших разношёрстных войск, но теперь, когда у нас достаточно сил и людей, Севастопольская кажется идеальным кандидатом для нашей экспансии..."
