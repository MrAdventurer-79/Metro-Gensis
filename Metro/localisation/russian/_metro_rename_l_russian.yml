l_russian:
### Общее ###
  state_was_renamed_communist: "Станция была переименована коммунистами"
  state_was_renamed_berilag: "На станции был организован специальный лагерь..."
  state_was_renamed_trotskyist: "Станция была переименована троцкистами"
  state_was_renamed_stalinist: "Станция была переименована сталинистами"
  preserved_soviet_legacy: "Сохранил советское наследие"
  conducted_desovietization: "Провел десоветизацию"
  state_was_renamed_reich: "Станция была переименована фашистами"
  state_was_renamed_bandit: "Станция была переименована бандитами"
  state_was_renamed_monarchist: "Станция была переименована монархистами"

 #Решения#
  generic_rename_decisions: "Перестройка"

  generic_rename_teatralnaya: "Переименовать станцию: §O[330.GetName]§!"
  generic_rename_aleksandrovsky_sad: "Переименовать станцию: §O[244.GetName]§!"
  generic_rename_state_228: "Переименовать станцию: §O[228.GetName]§!"

 #События#

  generic_rename_event.1.t: "Переименовать станцию: [330.GetName]"
  generic_rename_event.1.d: "По результатам мирного договора мы заполучили Театр. Права это уже не тот Театр каким мы знали до советизации: эти пропагандистские листовки, восхваление социализма, Ленина и еще хрен пойми кого... К ЧЕРТУ ЭТИ КРАСНЫЕ ФЛАГИ! Пора устроить генеральную уборку."
  generic_rename_event.1.a: "За работу!"

  generic_rename_event.2.t: "Переименовать станцию: [244.GetName]"
  generic_rename_event.2.d: "Мы отбили одну из жемчужин человечества у социалистов. Однако нам предстоит много работы по реставрации. Пусть же вновь будет озарена светом станция Александровский Сад!"
  generic_rename_event.2.a: "УРААА!"

  generic_rename_event.3.t: "Переименовать станцию: [228.GetName]"
  generic_rename_event.3_berilag: "Господи! Во что же эти  красные превратили станцию... В лагерь смертников, а теперь... К черту это все. Нужно бедолаг похоронить, а станцию перестроить."
  generic_rename_event.3_desc: "Коммунисты. Эхх... Кого только не восхваляют, но они забыли об истинных героях. Например, тех кто воевал за Родину в Великой Отечественной Войне!"
  generic_rename_event.3_kill_soviet: "Теперь эта станция с пережитками прошлого под нашим контролем. Новая история этого клочка земли начнется с..."
  generic_rename_event.3.a: "В память о маршале Рокоссовском"
  generic_rename_event.3.b: "Уничтожения всего советского"

### Коммунисты ###
 
 #Решения#
  communist_rename_decisions: "Советизация"

  communist_rename_teatralnaya: "Переименовать станцию: §O[330.GetName]§!"
  communist_rename_aleksandrovsky_sad: "Переименовать станцию: §O[244.GetName]§!"
  communist_rename_state_228: "Переименовать станцию: §O[228.GetName]§!"

 #События#

  communist_rename_event.1.t: "Переименовать станцию: [330.GetName]"
  communist_rename_event.1.d: "Наконец-то мы выдворили из Театра последние контрреволюционные элементы. Пора всенародным голосованием решить дальнейшую судьбу остатков Большого Театра... /nКаким будет название станции?.."
  communist_rename_event.1.a: "Ленинская"
  communist_rename_event.1.b: "Площадь Свердлова"

  communist_rename_event.2.t: "Переименовать станцию: [244.GetName]"
  communist_rename_event.2.d: "После стольких лет одна из станции колыбели человечества Полиса была озарена факелом социализма... Нет! Была озарена факелом §RНового Красного Мира!§! /nВ честь этого значимого события мы приведем в полный порядок одну из первых станций Московского Метрополитена имени Владимира Ильича Ленина."
  communist_rename_event.2.a: "Да здравствует станция Коминтерн!"
  communist_rename_event.2.b: "Да здравствует станция Калининская!"

  communist_rename_event.3.t: "Переименовать станцию: [228.GetName]"
  communist_rename_event.3_berilag: "ЭТО ЧТО?! ЛАГЕРЬ С ТРУПАМИ?! ПОЗОР НАМ ЗАЩИТНИКАМ СОЦИАЛИЗМА. ПОЗОР НАМ ЗАЩИЩАЮЩИХ ПРОЛЕТАРИАТ. ПОРА ИСКУПИТЬ ГРЕХИ."
  communist_rename_event.3_trotskyist: "Выбили этих бандитов, верящих в ложь Троцкого. Мда... И что теперь делать нам с этими развалинами?"
  communist_rename_event.3_desc: "Мы отбили станцию у врагов народа. Теперь нам предстоит долго и упорно разбирать и перебирать эти завалы."
  communist_rename_event.3.a: "Пора восстановить Берилаг."
  communist_rename_event.3.b: "Очистим станцию от сталинской грязи."
  communist_rename_event.3.c: "Отреставрируем и вернем старое название."
  communist_rename_event.3.d: "Отреставрируем и назовем её в честь маршала Рокоссовского."