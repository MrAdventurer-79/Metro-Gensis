  generic_rename_event.1.t: "Rename station: [330.GetName]"
  generic_rename_event.1.d: "As a result of the peace treaty, we got the Theatre. The rights are no longer the same Theatre as we knew before Sovietization: these propaganda leaflets, the praise of socialism, Lenin and who knows who else... TO HELL WITH THESE RED FLAGS! It's time to do a general cleaning."
  generic_rename_event.1.a: "Get to work!"

