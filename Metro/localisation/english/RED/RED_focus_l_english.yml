l_english:

 fascist_communist_skirmishes_tt: "\nWe will see to it that the other side are wiped from the face of the earth. No other option than subjugation will do!"

 RED_bulwark_of_socialism: "Bulwark of Socialism"
 RED_bulwark_of_socialism_desc: "Birthed from Sokolnicheskaya; the testament and glory of the Soviet State itself, emerged the Red Line. Formed from Komsomol figures, survivng veterans and many more who were nostalgic for Russias Socialist Past. No where else properly emulates the majesty - and might of the Soviet Union than the Red Line."

 RED_state_of_the_line: "State of the Line"
 RED_state_of_the_line_desc: "Whilst disasterous for all participants. The ripples from Hanza-Redline war can be felt more sternly within the Red Line. Andreys dreams of a unified Metro - crushed. With Peace, that has only created a sense of weakness within. Mutinies of political dissidents, and revolutionaries afar. The situation must be adressed."

 RED_question_of_economy: "Question of Economics"
 RED_question_of_economy_desc: "Our economy has quite simply, reached a slump. It will take more pragmatism than just a mere injection of funds to fix the ramshackle state its in."

 RED_economic_demobilisation: "Economic demobilisation"
 RED_economic_demobilisation_desc: "With the Hanza-Redline war a fading memory in the lives of their subject, their daily toil remains otherwise. We still follow the same economic policies and production quotas during the war no more than half a decade ago. Despite Andreys best efforts torejuvinate the otherwise economically stagnant Red Line has proven to have hit several roadblocks. Now it requires his unwarrented attention."

 RED_formalise_ministry_of_economics: "Formalise Ministry of Economics"
 RED_formalise_ministry_of_economics_desc: "As an effort to combat the rising resentment within our population, the Economics of the Red Line must be formally adressed. Andrey and his close-knit group of ministers and secretaries cannot keep track of every station, backwater farm and pig carcass-stall in the Red Line. With the winding back of our Militarist-style grain requesitioning, we can now focus on growing our economy."

 RED_assume_kulak_property: "De-Kulakization Campaigns"
 RED_assume_kulak_property_desc: "Providing our citizens with economic rebates, especially aimed towards our agriculturalists will inject a much needed economic surplus into our economy. With added independence however, it has been a growing concern that some of our farmers may indeed be too better for their own good. Farmers who have already begun selling 'too much' grain. A rising secretive middle-class of Kulaks. Capitalistic profiteering right under our very noses."

 RED_unionise_inefficient_sectors: "Unionize Inefficient Sectors"
 RED_unionise_inefficient_sectors_desc: "Stagnant wages and working conditions has given rise to our slump. The Inefficient sectors of our economy must be improved upon. During the Hanza-Redline Conflict local administrations were allowed to directly control inter-stational industries without involvement. But now the war has passed. As our mobility to produce and sustain the line grows, the need for labour will increase."

 RED_question_of_prodrazvyorstka: "Question of Prodrazvyorstka"
 RED_question_of_prodrazvyorstka_desc:0 "Prodrazvyorstka, or grain requesitioning based upon state-quotas helped support and supply our army immensly during the Hanza-Redline war, but no longer are we fighting on all fronts. Our economy is stagnant, and our population drained from the constant siezure of foodstock. Food quotas should be reconsidered."

 RED_question_of_military: "Question of Military"
 RED_question_of_military_desc:0 "Our military remains bloated, and in dire need of a rapid comprehensive overhaul. The only issue is the absurd power the military high command reigns over the Red Line. Removing their power is something to be done with caution, lest risk them thinking twice about their allegiance to the General Secretariat."

 RED_command_reforms: "Command Reforms"
 RED_command_reforms_desc:0 "During the war, much of our forces were spread sporadically across the Sokolnicheskaya line, combined operations were infrequent given the nature of the war. With a more comprehensive and unified command structure our forces could be deployed more effectively, and improved upon from an organized committee."

 RED_military_renovations: "Military Renovations"
 RED_military_renovations_desc: "Despite one of the largest current armed forces in the metro, the state of our forces proves otherwise. A rag-tag rabble with pipe guns, than a fully-fledged armed forces. Something needs to be done about its state."

 RED_establish_officer_academy: "Establish Officer Academy"
 RED_establish_officer_academy_desc: "The new generations of young officers will have to endure the harsh new realities of the metro. This must include ever changing and evolving landscape of warfare."

 RED_new_officer_corps: "Young Officer Corps"
 RED_new_officer_corps_desc: "The youth are the future. We must lead them, teach them to inherit the earth which they eventually shall. We must also bestow them knowledge needed to preserve the Red Line and the interest of the Revolution."

 RED_young_officer_academy: "Establish Young-Officers Academy"
 RED_young_officer_academy_desc: "The Budding youth and junior officers of today, and the generals and commanders tomorrow. By fire, steel and pure grit they'll reclaim the world. In flames of Revolution, and not radiation this time."

 RED_future_officers_tt: "The establishment of an officers academy will take some time, but will make our future commanders much more competent."

 RED_question_of_brotherhood: "Question of Brotherhood"
 RED_question_of_brotherhood_desc: "Something more pressing to for Andrey, and hits closer to home. His brother. Proven himself to be a competent strategist within recent years, someone who in this day of trechary and betrayal Andrey could trust most of all. However this would be true if Maxim had no secretive spite towards his older brother."

 RED_new_economic_draft: "New Economic Draft"
 RED_new_economic_draft_desc: "With pressing matters dealt with, now the efforts can be made to rectify the slumped Economy. Andrey believes with the introduction of new economic policies, the Red Line can become economically rejuvinated. If not even able to compete with that of the Hanza."
 RED_new_economic_draft_tt: "Based upon your decisions made, a economic plan will be drawn up.\n\n§RThere is no opting out of the focus until it is completed.§!"

 RED_move_the_capital: "Moving the Capital"
 RED_move_the_capital_desc: "While [264.GetName] was the epicenter of the revolution, much of the Sokol line has been consolidated under the red banner. To fully and efficiently extend our grasp across the entire line, it is suggested that we move our capital station somewhere closer to the center of the Line itself."
 
 
 RED_crisis: "Red Line in Peril"
 RED_crisis_desc: "Peril grips the Red Line. Shaking it to its very core foundations. Andrey Must tread lightly to secure the preservation of the Entire Line."

 RED_inaugerate_korbut: "Inaugerate Korbut"
 RED_inaugerate_korbut_desc: "With disobedient members in the military, and the encroaching fears of violent uprisings by our population. Not to mention those witin our own party who have fled, with secretive documents which could damn the entire Red Line if they fell into wrong hands. Andreys government is in peril. The KGB remains loyal still and can be put to good usage. However, their leader is the last person Andrey would have wanted.\n\nBetter the demon you know, than the demon you do not."
 RED_korbut_inaugerate_tt: "The §YState Security Committee§!, or §YKGB§! will be given emergency power. The situation with the defector will be dealt with, and damming documents restored."
 
 RED_deal_with_military_mutinies: "Deal with the Mutinies"
 RED_deal_with_military_mutinies_desc: "The Military demonstrators must be dealt with immediately. Would-be mutineers must be stopped. Let this be a lesson those who have turned their backs to the Red Line"
 RED_military_mutinies_decisions_tt: "This will unlock the ability to deal with insubordination within our military through §CDecisions§!."

 RED_rid_mutinies: "Rid the Mutinies"
 RED_rid_mutinies_desc: "Enemies of the revolution lay all around us, and yet we fight amongst one another. These military mutinies are no more than a roadblock leading to the innevitable path of Communism. A cancerous tumor upon our reign. The military serves themselves, and not to the true ideals of Lenin. They must be removed, their power gone."
 RED_military_rid_mutinies_tt: "We will be able to remove the §YMiltary Mutinies§! national spirit through §CDecisions§!."

 RED_nkvd_divisions: "Establish NKVD battalions"
 RED_nkvd_divisions_desc: "The NKVD are still devoted despite the military having alterior allegances. Regardless of Korbuts intentions, his heart remains unquestionably loyal to the Red Line, and he'll see to it these counter-revolutionaries are squashed. With that the NKVD are to be retrofitted and expanded upon; preforming mainline battle duties in conjunction."
 RED_NKVD_oob_tt: "\n§C2§! NKVD divisions will spawn at our Capital!"
 
 RED_approach_dissenters: "Aproaching the Middle"
 RED_approach_dissenters_desc: "Whilst those who have disobeyed commands directly from Revolution Square are unwilling to return to the fold; signed their death warrants, there still exists a percentage of those who have yet to swear absolute authority to the Sokol despite dubious words of loyalty. Make it be clear; you are either marching beside the banner of the revolution; or against it. No more than the capitalist, fascist lazy infiltrators. Many still are loyal to Andreys authority, and more faithful to the Red Line. Their support must be echoed and strengthened."
 RED_approach_commanders_tt: "We will approach those who had not openly sided with either Andrey or Kovshov, and win their support"

 RED_out_of_sight: "Out of Sight"
 RED_out_of_sight_desc: "As the saying goes, the ticket to Lubyanka only goes one way. Used as a political prison to house those who wishes ill against the state. Now it can be used to house military forces which defy Andreys rule. Defiance will not be tolerated."

 RED_martyrs_disappear: "Martyrs Disappear"
 RED_martyrs_disappear_desc: ""

 RED_mutiny_is_crumbling: "The §RMutinies§! must be beginning to falter!"

 RED_rallying_cry: "A rallying Cry"
 RED_rallying_cry_desc: "Those who are loyal to the Red Line, must stand up. It must be known, those who stand in the way of the workers revolution are no better than vile fascists or bloated capitalists. The enemy is not only outside, but also within. Both those enemies must be crushed."
 RED_rallying_cry_tt: "\n§CTwo§! §YInfantry Divisions§! will spawn at our capital!"

 RED_name_and_shame: "Name and Shame"
 RED_name_and_shame_desc: "It must be heard. Loud and Clear. Those who are not loyal to the General Secretary, is not loyal to the Red Line. No more than troublesome conspirers against the Revolution."

 RED_squash_dissidents: "Squash Dissidents"
 RED_squash_dissidents_desc: "Those who were originally loyal to Kovshov are beginning to have second-doubts and are turning away from him. Regardless still are enemies of the revolution, and must be put to death."

 RED_promote_loyalty: "Promote Loyalty"
 RED_promote_loyalty_desc: "To those who have remained loyal to Communism and to the Central Government, it must be known we have their upmost respect and gratitude towards."

 RED_the_great_show_trial: "Begin the great Show Trial"
 RED_the_great_show_trial_desc: "The power of Kovshov begins to wain."

 RED_staff_purge: "Begin the Purge!"
 RED_staff_purge_desc: "With the dissidents quelled, now would be a better time than ever to completely remove the taint of corruption within the military. We must consolidate control back from prying corruption. The military serves the central government, not the other way around."
 RED_staff_purge_removal_prerequesites_tt: "We will be unable to change our §RMilitary Law§! until the idea is removed."

 RED_unlock_next_focus_tree_tt: "\n\nOnce §GStaff Purge§! and §GThe Crowd Stills§! Focuses are compelted an event will shortly fire unlocking the next subsequent tree."
 
 RED_dismantle_mushroom_revolts: "Dismantle Mushroom Revolts"
 RED_dismantle_mushroom_revolts_desc: "These revolters are no more than starving commoners who wish to quell the flames and bring the whole line crumbling down. They prey upon the current issues and exascerbate them further. It has to be dealt with"

 RED_approach_hanza: "Approach Hanza"
 RED_approach_hanza_desc: "The last state we'd like to approach, considering both the Redline and them are not particularly on great standings. And dealing with our ideological nemesis? A capitalist state? Absolutely unheard of."
 RED_approaching_hanza: "Approach Hanza"

 RED_new_polis_treaty: "New Polis Treaty"
 RED_new_polis_treaty_desc: "Similarly from before, and under the guise of rectifying the treaty of past. Hanza and the Redline will meet at Polis station. Hanza will supply the Red Line with food, whilst the Red Line shall commit itself to the balancing of neutrality within the metro. For now atleast"
 RED_new_polis_treaty_tt: "\nWe will be §Ounable§! to change our §CTrade Law§! for the duration of the §ONational Spirit§!\n"

 RED_mushroom_trades: "Mushroom Trades"
 RED_mushroom_trades_desc: "Supply trains and carriages come in and out From Hanza, guarded by only the most loyal to not cause a disturbance."

 RED_deal_well_made: "Deal Well Made"
 RED_deal_well_made_desc: "Mutual agreement between Red Line and Hanza has proven to be lucrative within trade. The two nations despite their differences are atleast able to go about trade diplomatically. Albeit with baited breath and hushed doubt about one another."

 RED_sabotage_the_revolution: "Sabotage the Revolution"
 RED_sabotage_the_revolution_desc: "The revolution is only starting. It will become a snowball if left uncheck. An idea provided by the State Security is by planting spies within their own ranks and causing destruction from the inside. A monopoly on the bedlam."
 RED_sabotage_the_revolution_tt: "We use the NKVD to infiltrate and subvert the growing resentment through §YDecisions§!."

 RED_crackdowns: "Crackdowns"
 RED_crackdowns_desc: ""
 RED_crackdowns_tt: "Enables another §YDecision§! to deal with the mushroom revolts."

 RED_has_completed_sabotaged_revolution: "Has begun military crackdowns"
 RED_has_infiltrated_revolution: "Infiltrating the rebel ranks"

 RED_repress_the_evidence: "Repress the Evidence"
 RED_repress_the_evidence_desc: "No word should ever come out about these protests nor the mass incarcarations which took place. The demonstrations never took place, never happened and never existed."

 RED_rid_the_ring_leaders: "Rid the Ring Leaders"
 RED_rid_the_ring_leaders_desc: ""

 RED_reforms: "Inner Reforms"
 RED_reforms_desc: "The Redline has strayed away from its revolutionary ideals of class socialism and equality. It has become militarised and strayed away from the very people who established it all those years ago. A comprehensive reform of the ins and outs of the party and its operations is needed to afford it winning back the love and loyalty of the commonfolk."
 RED_inner_reforms: "Inner Reforms"

 RED_meet_with_the_revolters: "Meet with the Revolters"
 RED_meet_with_the_revolters_desc: "After arduous talks, a meeting has been arranged between the Central Government and the demonstrators in a secluded area. Lets hope it all goes well..."

